{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shop text-warning" style="font-size:3rem"></i>
                    <h3 class="mt-2">MiniShop</h3>
                    <p class="text-muted">Electronics &amp; Accessories</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Your username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right"></i> Sign In
                    </button>
                </form>
                <div class="text-center">
                    <a href="{{ url_for('register') }}" class="text-decoration-none">Create an account</a>
                </div>
            </div>
        </div>
        <div class="card mt-3 border-info">
            <div class="card-body small">
                <strong>Demo:</strong> admin / Admin123!
            </div>
        </div>
    </div>
</div>
{% endblock %}
